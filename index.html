<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Weather App</h1>
        <div class="search">
            <input type="text" id="city" placeholder="Enter city name" />
            <button onclick="getWeather()">Get Weather</button>
        </div>
        <div id="weather" class="weather-info">
            <!-- Weather data will be displayed here -->
        </div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById("city").value.trim();
            if (!city) {
                alert("Please enter a city name");
                return;
            }

            const res = await fetch(`/weather?location=${city}`);
            const data = await res.json();

            const weatherDiv = document.getElementById("weather");

            if (data.error) {
                weatherDiv.innerHTML = `<p class="error">${data.error}</p>`;
            } else {
                weatherDiv.innerHTML = `
                    <div class="weather-card">
                        <h2>${data.city}</h2>
                        <img src="https://openweathermap.org/img/w/${data.icon}.png" alt="${data.description}" class="weather-icon">
                        <p class="temp">${data.temperature}</p>
                        <p class="desc">${data.description}</p>
                        <div class="details">
                            <p>Humidity: ${data.humidity}</p>
                            <p>Wind Speed: ${data.windSpeed}</p>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
